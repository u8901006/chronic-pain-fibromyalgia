name: Chronic Pain Daily Report

on:
  schedule:
    - cron: "0 6 * * *" # UTC 06:00 = 台北時間 14:00
  workflow_dispatch:
    inputs:
      date:
        description: "Target date (YYYY-MM-DD), leave empty for today"
        required: false
        default: ""

# Minimum permissions required for the workflow
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Cache node_modules
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm install

      - name: Determine date
        id: date
        run: |
          INPUT_DATE="${{ github.event.inputs.date }}"
          if [ -n "$INPUT_DATE" ]; then
            echo "target=$INPUT_DATE" >> $GITHUB_OUTPUT
          else
            TARGET=$(TZ=Asia/Taipei date +%Y-%m-%d)
            echo "target=$TARGET" >> $GITHUB_OUTPUT
          fi
          echo "Date: $(cat $GITHUB_OUTPUT | grep target | cut -d= -f2)"

      - name: Fetch papers from PubMed
        run: |
          node scripts/fetch_papers.mjs --days 7 --max-papers 50 --output papers.json 2>&1 || echo "Fetch had issues, continuing..."

      - name: Check papers data
        id: papers
        run: |
          if [ -f papers.json ] && grep -q '"count"' papers.json; then
            COUNT=$(node --input-type=module -e "import {readFileSync} from 'fs'; const d=JSON.parse(readFileSync('./papers.json','utf-8')); console.log(d.count||0)")
            echo "count=$COUNT" >> $GITHUB_OUTPUT
            echo "Papers found: $COUNT"
          else
            echo "count=0" >> $GITHUB_OUTPUT
            echo '{"date":"${{ steps.date.outputs.target }}","count":0,"papers":[]}' > papers.json
            echo "No papers found, will generate empty report"
          fi

      - name: Generate report with Zhipu AI
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
        run: |
          node scripts/generate_report.mjs \
            --input papers.json \
            --output docs/chronic-pain-${{ steps.date.outputs.target }}.html

      - name: Generate index page
        run: node scripts/generate_index.mjs

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git stash --include-untracked || true
          git pull --rebase origin main
          git stash pop || true
          git add docs/
          git commit -m "📄 chronic pain daily report: ${{ steps.date.outputs.target }}"
          git push

      - name: Summary
        run: |
          echo "### 📄 Chronic Pain Daily Report" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** ${{ steps.date.outputs.target }}" >> $GITHUB_STEP_SUMMARY
          echo "**Papers analyzed:** ${{ steps.papers.outputs.count }}" >> $GITHUB_STEP_SUMMARY
          echo "**Report:** [chronic-pain-${{ steps.date.outputs.target }}.html](https://u8901006.github.io/chronic-pain-fibromyalgia/chronic-pain-${{ steps.date.outputs.target }}.html)" >> $GITHUB_STEP_SUMMARY
